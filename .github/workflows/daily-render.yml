name: Daily Viral Video Render
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Project date (YYYY-MM-DD)'
        required: false
        type: string
        default: ''
  schedule:
    - cron: '0 2 * * *'
env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  RENDER_CALLBACK_URL: ${{ secrets.RENDER_CALLBACK_URL }}
  RENDER_CALLBACK_SECRET: ${{ secrets.RENDER_CALLBACK_SECRET }}
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Resolve date
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |-
          if [ -n "${INPUT_DATE}" ]; then
            echo "DATE=${INPUT_DATE}" >> $GITHUB_ENV
          else
            echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          fi
      - name: Install FFmpeg
        run: sudo apt update -qq && sudo apt install ffmpeg -y -qq && ffmpeg -version
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Install Hyperframes
        run: npm install -g hyperframes
      - name: Install yt-dlp
        run: sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && sudo chmod a+x /usr/local/bin/yt-dlp && yt-dlp --version
      - name: Download pending videos (yt-dlp)
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |-
          mkdir -p render-assets/videos render-assets/memes render-assets/audio render-assets/thumbs
          DOWNLOADS=$(curl -s -H "Authorization: Bearer ${CF_API_TOKEN}" "${RENDER_CALLBACK_URL%/*}/downloads/${{ env.DATE }}" | jq -c '.downloads[]' 2>/dev/null || echo "")
          echo "$DOWNLOADS" | while read item; do
            URL=$(echo "$item" | jq -r '.source_url' 2>/dev/null)
            ID=$(echo "$item" | jq -r '.id' 2>/dev/null)
            PLATFORM=$(echo "$item" | jq -r '.platform' 2>/dev/null)
            [ -z "$URL" ] && continue
            echo "Downloading $PLATFORM:$ID from $URL"
            yt-dlp -f "bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]" \
              --output "render-assets/videos/$(echo $ID | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}_//').mp4" \
              "$URL" || true
          done || true
      - name: Upload pending videos to R2
        run: |-
          for f in render-assets/videos/*.mp4; do
            [ -f "$f" ] || continue
            key="${{ env.DATE }}/videos/$(basename "$f")"
            echo "Uploading $f to $key"
            wrangler r2 object put "viral-video-assets/$key" --file "$f" --remote || true
          done || true
      - name: Download assets from R2
        run: |-
          echo "Date: ${{ env.DATE }}"
          wrangler r2 object get viral-video-assets/${{ env.DATE }}/composition/index.html --file render-assets/composition.html --remote || true
          wrangler r2 object list viral-video-assets --prefix ${{ env.DATE }}/thumbs/ --remote 2>/dev/null | jq -r 'if type=="array" then .[].key else objects|.key end' 2>/dev/null | while read key; do
            wrangler r2 object get "viral-video-assets/$key" --file "render-assets/thumbs/$(basename $key)" --remote || true
          done || true
          wrangler r2 object list viral-video-assets --prefix ${{ env.DATE }}/memes/ --remote 2>/dev/null | jq -r 'if type=="array" then .[].key else objects|.key end' 2>/dev/null | while read key; do
            wrangler r2 object get "viral-video-assets/$key" --file "render-assets/memes/$(basename $key)" --remote || true
          done || true
          wrangler r2 object list viral-video-assets --prefix ${{ env.DATE }}/audio/ --remote 2>/dev/null | jq -r 'if type=="array" then .[].key else objects|.key end' 2>/dev/null | while read key; do
            wrangler r2 object get "viral-video-assets/$key" --file "render-assets/audio/$(basename $key)" --remote || true
          done || true
      - name: Render to MP4
        run: |-
          cd render-assets && mkdir -p output
          if [ -f composition.html ]; then
            npx hyperframes render --input composition.html --output output/output.mp4
          fi
          if [ ! -f output/output.mp4 ]; then
            echo "Hyperframes render failed, trying fallback"
            python3 -c "h='<h1>${{ env.DATE }}</h1>';open('fb.html','w').write(h)"
            npx hyperframes render --input fb.html --output output/output.mp4 || true
          fi
      - name: Generate thumbnail
        run: if [ -f render-assets/output/output.mp4 ]; then ffmpeg -i render-assets/output/output.mp4 -ss 00:00:01 -vframes 1 -vf "scale=540:960" render-assets/output/thumbnail.jpg -y; fi || true
      - name: Upload to R2
        run: |-
          if [ -f render-assets/output/output.mp4 ]; then
            wrangler r2 object put viral-video-renders/${{ env.DATE }}/output.mp4 --file render-assets/output/output.mp4 --remote
            if [ -f render-assets/output/thumbnail.jpg ]; then
              wrangler r2 object put viral-video-renders/${{ env.DATE }}/thumbnail.jpg --file render-assets/output/thumbnail.jpg --remote
            fi
          fi
      - name: Notify Cloudflare
        run: |-
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 render-assets/output/output.mp4 2>/dev/null || echo "0")
          curl -X POST "${RENDER_CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"date\":\"${{ env.DATE }}\",\"status\":\"done\",\"r2Key\":\"${{ env.DATE }}/output.mp4\",\"duration\":${DURATION:-0},\"secret\":\"${RENDER_CALLBACK_SECRET}\"}"