name: Daily Viral Video Render
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Project date (YYYY-MM-DD)'
        required: false
        type: string
        default: ''
  schedule:
    - cron: '0 2 * * *'
env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  RENDER_CALLBACK_URL: ${{ secrets.RENDER_CALLBACK_URL }}
  RENDER_CALLBACK_SECRET: ${{ secrets.RENDER_CALLBACK_SECRET }}
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Resolve date
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |-
          if [ -n "${INPUT_DATE}" ]; then
            echo "DATE=${INPUT_DATE}" >> $GITHUB_ENV
          else
            echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV
          fi
      - name: Verify
        run: echo "Rendering for ${{ env.DATE }}"
