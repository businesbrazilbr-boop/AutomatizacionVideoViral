name: Manual Video Render
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Project date (YYYY-MM-DD)'
        required: true
        type: string
env:
  RENDER_CALLBACK_URL: ${{ secrets.RENDER_CALLBACK_URL }}
  RENDER_CALLBACK_SECRET: ${{ secrets.RENDER_CALLBACK_SECRET }}
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Install deps
        run: |-
          sudo apt update -qq && sudo apt install ffmpeg -y -qq
          npm install -g hyperframes
      - name: Download assets and render
        run: |-
          WORKER_URL="${RENDER_CALLBACK_URL%/api/*}"; mkdir -p r/thumbs r/memes
          curl -sf "${WORKER_URL}/api/assets/${{ inputs.date }}/composition/index.html" -o r/composition.html || true
          if [ -f r/composition.html ]; then
            grep -oP 'src="(thumbs/[^"]+|memes/[^"]+|audio/[^"]+)"' r/composition.html | while read -r match; do
              src="${match#src=\"}"; src="${src%\"}"
              mkdir -p "$(dirname "r/$src")"
              curl -sf "${WORKER_URL}/api/assets/${{ inputs.date }}/$src" -o "r/$src" || true
            done
            cp r/composition.html r/index.html
            (cd r && npx hyperframes render . --output o.mp4) || true
          fi
          if [ ! -f r/o.mp4 ]; then
            python3 -c "open('r/index.html','w').write('<h1>${{ inputs.date }}</h1>')"
            (cd r && npx hyperframes render . --output o.mp4) || true
          fi
      - name: Upload & notify
        run: |-
          WORKER_URL="${RENDER_CALLBACK_URL%/api/*}"
          if [ -f r/o.mp4 ]; then
            curl -sf -X PUT "${WORKER_URL}/api/upload/${{ inputs.date }}/output.mp4" --data-binary "@r/o.mp4" -H "Content-Type: video/mp4" || true
            ffmpeg -i r/o.mp4 -ss 00:00:01 -vframes 1 -vf "scale=540:960" r/t.jpg -y || true
            if [ -f r/t.jpg ]; then
              curl -sf -X PUT "${WORKER_URL}/api/upload/${{ inputs.date }}/thumbnail.jpg" --data-binary "@r/t.jpg" -H "Content-Type: image/jpeg" || true
            fi
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 r/o.mp4 2>/dev/null || echo "0")
          curl -X POST "${RENDER_CALLBACK_URL}" -H "Content-Type: application/json" \
            -d "{\"date\":\"${{ inputs.date }}\",\"status\":\"done\",\"r2Key\":\"${{ inputs.date }}/output.mp4\",\"duration\":${DURATION:-0},\"secret\":\"${RENDER_CALLBACK_SECRET}\"}"