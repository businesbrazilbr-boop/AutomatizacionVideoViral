name: Manual Video Render
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Project date (YYYY-MM-DD)'
        required: true
        type: string
env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Install deps
        run: |-
          sudo apt update -qq && sudo apt install ffmpeg -y -qq
          npm install -g wrangler hyperframes
      - name: Download and render
        run: |-
          mkdir -p r && cd r
          wrangler r2 object get viral-video-assets/${{ inputs.date }}/composition/index.html --file c.html || true
          if [ -f c.html ]; then
            npx hyperframes render --input c.html --output o.mp4 || true
          fi
          if [ ! -f o.mp4 ]; then
            python3 -c "open('f.html','w').write('<h1>${{ inputs.date }}</h1>')"
            npx hyperframes render --input f.html --output o.mp4 || true
          fi
      - name: Upload
        run: wrangler r2 object put viral-video-renders/${{ inputs.date }}/manual-o.mp4 --file r/o.mp4 || true
