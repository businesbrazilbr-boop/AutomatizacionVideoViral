name: Manual Video Render
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Fecha del proyecto (YYYY-MM-DD)'
        required: true
        type: string
        default: ''

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install FFmpeg
        run: sudo apt update -qq && sudo apt install ffmpeg -y -qq

      - name: Install Wrangler + Hyperframes
        run: npm install -g wrangler hyperframes

      - name: Download assets from R2
        run: |
          mkdir -p render-assets
          DATE="${{ inputs.date || github.event.client_payload.date }}"
          wrangler r2 get viral-video-assets/${DATE}/composition/index.html --output render-assets/composition.html || true

      - name: Render to MP4
        run: |
          cd render-assets
          npx hyperframes render --input composition.html --output output.mp4

      - name: Upload to R2
        run: |
          DATE="${{ inputs.date || github.event.client_payload.date }}"
          wrangler r2 put viral-video-renders/${DATE}/manual-output.mp4 --file render-assets/output.mp4
