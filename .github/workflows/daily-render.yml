name: Daily Viral Video Render
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Project date (YYYY-MM-DD)'
        required: false
        type: string
        default: ''
  schedule:
    - cron: '0 2 * * *'
env:
  RENDER_CALLBACK_URL: ${{ secrets.RENDER_CALLBACK_URL }}
  RENDER_CALLBACK_SECRET: ${{ secrets.RENDER_CALLBACK_SECRET }}
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }
      - name: Resolve date
        env:
          INPUT_DATE: ${{ inputs.date }}
        run: |-
          if [ -n "${INPUT_DATE}" ]; then echo "DATE=${INPUT_DATE}" >> $GITHUB_ENV; else echo "DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV; fi
      - name: Install deps
        run: |-
          sudo apt update -qq && sudo apt install ffmpeg -y -qq
          npm install -g hyperframes
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && sudo chmod a+x /usr/local/bin/yt-dlp
      - name: Download videos
        shell: bash
        run: |-
          set +e
          WORKER_URL="${RENDER_CALLBACK_URL%/api/*}"
          mkdir -p render-assets/videos render-assets/thumbs
          RESP=$(curl -s "${WORKER_URL}/api/downloads/${{ env.DATE }}")
          echo "=== Pending downloads ==="
          echo "$RESP" | jq -r '.downloads[] | .id' 2>/dev/null || echo "(none)"
          ITEMS=$(echo "$RESP" | jq -c '.downloads[]' 2>/dev/null)
          COLORS=("red" "green" "blue" "purple" "orange")
          IDX=0
          while IFS= read -r ITEM; do
            [ -z "$ITEM" ] && continue
            URL=$(echo "$ITEM" | jq -r '.source_url')
            ID=$(echo "$ITEM" | jq -r '.id')
            YTID=$(echo "$URL" | sed 's/.*v=//' | sed 's/&.*//')
            [ -z "$URL" ] && continue
            FNAME=$(echo "$ID" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}_//')
            OUT="render-assets/videos/${FNAME}.mp4"
            echo ""
            echo ">>> $FNAME (yt:$YTID)"
            
            # Strategy 1: Download via Worker
            echo "  [1] Worker download..."
            DL=$(curl -s -X POST "${WORKER_URL}/api/youtube-download" \
              -H "Content-Type: application/json" \
              -d "{\"videoId\":\"$YTID\",\"date\":\"${{ env.DATE }}\",\"filename\":\"$FNAME\"}")
            echo "  Worker response: $(echo "$DL" | jq -c .)"
            SIZE=$(echo "$DL" | jq -r '.size // "0"')
            if [ "$SIZE" != "0" ] && [ "$SIZE" != "null" ]; then
              curl -sf "${WORKER_URL}/api/assets/${{ env.DATE }}/videos/${FNAME}.mp4" -o "$OUT" || true
              if [ -f "$OUT" ] && [ "$(stat -c%s "$OUT")" -gt 1000 ]; then
                echo "  OK via Worker: $(stat -c%s "$OUT") bytes"
                IDX=$((IDX+1))
                continue
              fi
            fi
            
            # Strategy 2: yt-dlp
            COOKIES=""
            if [ -n "${{ secrets.YT_COOKIES }}" ]; then
              echo "${{ secrets.YT_COOKIES }}" | base64 -d > /tmp/yt-cookies.txt 2>/dev/null
              COOKIES="--cookies /tmp/yt-cookies.txt"
            fi
            curl -s "https://deno.land/install.sh" | sh >/dev/null 2>&1 < /dev/null || true
            export PATH="$HOME/.deno/bin:$PATH"
            echo "  [2] yt-dlp..."
            yt-dlp $COOKIES --js-runtimes deno \
              -f "worst[ext=mp4]/best[ext=mp4]" \
              --output "$OUT" "$URL" || echo "yt-dlp failed"
            if [ -f "$OUT" ] && [ "$(stat -c%s "$OUT")" -gt 1000 ]; then
              echo "  OK via yt-dlp: $(stat -c%s "$OUT") bytes"
              IDX=$((IDX+1))
              continue
            fi
            
            # Strategy 3: FFmpeg placeholder
            echo "  [3] Generating placeholder..."
            COLOR="${COLORS[$IDX]}"
            TITLE=$(echo "$ITEM" | jq -r '.title // "Clip"')
            # Strip special chars for FFmpeg drawtext
            TITLE=$(echo "$TITLE" | sed "s/'//g; s/[^a-zA-Z0-9 ]//g")
            FT="/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
            if [ -f "$FT" ]; then
              FONT_OPTS=":fontfile=$FT"
            else
              FONT_OPTS=""
            fi
            echo "FFMPEG>> color=$COLOR title=$TITLE font=$FT"
            ffmpeg -y -f lavfi -i "color=c=$COLOR:s=1080x1920:d=6:r=30" \
              -vf "drawtext=text=Clip:fontsize=48:fontcolor=white:x=(w-text_w)/2:y=(h-text_h)/2$FONT_OPTS" \
              -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p "$OUT" 2>&1 || \
            ffmpeg -y -f lavfi -i "color=c=$COLOR:s=1080x1920:d=6:r=30" \
              -c:v libx264 -preset ultrafast -crf 28 -pix_fmt yuv420p "$OUT" 2>&1 || true
            if [ -f "$OUT" ]; then
              echo "  Placeholder: $(stat -c%s "$OUT") bytes"
            fi
            IDX=$((IDX+1))
          done <<< "$ITEMS"
          echo ""
          echo "=== Videos in render-assets/videos/ ==="
          shopt -s nullglob; for f in render-assets/videos/*.mp4; do echo "  $f ($(stat -c%s "$f" 2>/dev/null || echo 0) bytes)"; done; shopt -u nullglob
          echo "=== Count ==="
          cnt=$(ls render-assets/videos/*.mp4 2>/dev/null | wc -l || true); echo "$cnt"
      - name: Download composition assets
        run: |-
          WORKER_URL="${RENDER_CALLBACK_URL%/api/*}"
          mkdir -p render-assets/thumbs render-assets/memes render-assets/audio
          curl -sf "${WORKER_URL}/api/assets/${{ env.DATE }}/composition/index.html" -o render-assets/composition.html || true
          if [ -f render-assets/composition.html ]; then
            grep -oP 'src="(videos/[^"]+|thumbs/[^"]+|memes/[^"]+|audio/[^"]+)"' render-assets/composition.html | while read -r match; do
              src="${match#src=\"}"; src="${src%\"}"
              local_path="render-assets/$src"
              if [ -f "$local_path" ] && [ "$(stat -c%s "$local_path" 2>/dev/null || echo 0)" -gt 1000 ]; then
                echo "  Already have $src ($(stat -c%s "$local_path") bytes, skipping)"
              else
                mkdir -p "$(dirname "$local_path")"
                tmp_path="${local_path}.tmp"
                curl -sf "${WORKER_URL}/api/assets/${{ env.DATE }}/$src" -o "$tmp_path" && mv "$tmp_path" "$local_path" || rm -f "$tmp_path"
              fi
            done
            cp render-assets/composition.html render-assets/index.html
          fi
      - name: Check assets before render
        shell: bash
        run: |-
          set +e
          WORKER_URL="${RENDER_CALLBACK_URL%/api/*}"
          mkdir -p diag
          echo "=== render-assets/ dirs ===" > diag/status.txt
          ls -la render-assets/ >> diag/status.txt 2>&1
          echo "" >> diag/status.txt
          echo "=== Videos ===" >> diag/status.txt
          shopt -s nullglob
          for f in render-assets/videos/*.mp4; do
            [ -f "$f" ] && echo "$f ($(stat -c%s "$f") bytes)" >> diag/status.txt
            [ -f "$f" ] && ffprobe -v error -show_entries format=format_name,duration,size,bit_rate -of csv=p=0 "$f" >> diag/status.txt 2>&1
          done
          echo "" >> diag/status.txt
          echo "=== index.html (first 10 lines) ===" >> diag/status.txt
          [ -f render-assets/index.html ] && head -10 render-assets/index.html >> diag/status.txt 2>&1 || echo "(no index.html)" >> diag/status.txt
          echo "" >> diag/status.txt
          cat diag/status.txt
          curl -sf -X PUT "${WORKER_URL}/api/upload/${{ env.DATE }}/diagnostic.txt" --data-binary "@diag/status.txt" -H "Content-Type: text/plain" || true
      - name: Render to MP4
        run: |-
          mkdir -p render-assets/output
          if [ -f render-assets/index.html ]; then
            (cd render-assets && npx hyperframes render . --output output/output.mp4) || \
            (cd render-assets && python3 -c "open('index.html','w').write('<h1>${{ env.DATE }}</h1>')" && \
             npx hyperframes render . --output output/output.mp4) || true
          fi
      - name: Generate thumbnail
        run: if [ -f render-assets/output/output.mp4 ]; then ffmpeg -i render-assets/output/output.mp4 -ss 00:00:01 -vframes 1 -vf "scale=540:960" render-assets/output/thumbnail.jpg -y; fi || true
      - name: Upload to Worker
        run: |-
          WORKER_URL="${RENDER_CALLBACK_URL%/api/*}"
          if [ -f render-assets/output/output.mp4 ]; then
            curl -sf -X PUT "${WORKER_URL}/api/upload/${{ env.DATE }}/output.mp4" --data-binary "@render-assets/output/output.mp4" -H "Content-Type: video/mp4" || true
          fi
          if [ -f render-assets/output/thumbnail.jpg ]; then
            curl -sf -X PUT "${WORKER_URL}/api/upload/${{ env.DATE }}/thumbnail.jpg" --data-binary "@render-assets/output/thumbnail.jpg" -H "Content-Type: image/jpeg" || true
          fi
      - name: Notify Cloudflare
        run: |-
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 render-assets/output/output.mp4 2>/dev/null || echo "0")
          curl -X POST "${RENDER_CALLBACK_URL}" -H "Content-Type: application/json" \
            -d "{\"date\":\"${{ env.DATE }}\",\"status\":\"done\",\"r2Key\":\"${{ env.DATE }}/output.mp4\",\"duration\":${DURATION:-0},\"secret\":\"${RENDER_CALLBACK_SECRET}\"}"